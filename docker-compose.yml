version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quizbot-postgres
    restart: always
    environment:
      POSTGRES_USER: quizbot_user
      POSTGRES_PASSWORD: quizbot_password
      POSTGRES_DB: quizbot_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
